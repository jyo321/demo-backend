version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    ECR_REPOSITORY: test-dev-backend
    ECS_CLUSTER: test-dev
    ECS_SERVICE: test-dev-backend
    TASK_DEFINITION_FAMILY: test-dev-backend

phases:
  install:
    commands:
      - "echo Installing jq..."
      - "yum install -y jq"

  pre_build:
    commands:
      - "echo Logging in to ECR..."
      - "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)"
      - "ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY"
      - "IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)"
      - "echo Image tag: $IMAGE_TAG"
      - "aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI"

  build:
    commands:
      - "echo Building Docker image..."
      - "docker build -t $ECR_REPOSITORY:$IMAGE_TAG ."
      - "docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:$IMAGE_TAG"

  post_build:
    commands:
      - "echo Pushing image..."
      - "docker push $ECR_URI:$IMAGE_TAG"

      - "echo Fetching current task definition..."
      - "aws ecs describe-task-definition --task-definition $TASK_DEFINITION_FAMILY > taskdef.json"

      - "echo Creating new task definition..."
      - "jq --arg IMAGE $ECR_URI:$IMAGE_TAG '.taskDefinition | {family: .family, networkMode: .networkMode, containerDefinitions: (.containerDefinitions | map(.image = $IMAGE)), requiresCompatibilities: .requiresCompatibilities, cpu: .cpu, memory: .memory, executionRoleArn: .executionRoleArn, taskRoleArn: .taskRoleArn}' taskdef.json > new-taskdef.json"

      - "echo Registering new task definition..."
      - "aws ecs register-task-definition --cli-input-json file://new-taskdef.json > taskdef-output.json"

      - "echo Extracting task definition ARN..."
      - "TASK_DEF_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' taskdef-output.json)"

      - "echo Updating ECS service..."
      - "aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $TASK_DEF_ARN"

artifacts:
  files:
    - '**/*'